services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — NestJS API Server
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: calllive-backend
    runtime: node
    region: singapore
    plan: starter
    buildCommand: >
      npm install -g yarn &&
      yarn install --frozen-lockfile &&
      yarn nx build twenty-server
    startCommand: node packages/twenty-server/dist/src/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SERVER_URL
        fromService:
          name: calllive-backend
          type: web
          property: host
      - key: FRONT_BASE_URL
        fromService:
          name: calllive-frontend
          type: web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: calllive-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: calllive-redis
          type: redis
          property: connectionString
      - key: APP_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: LOGIN_TOKEN_SECRET
        generateValue: true
      - key: FILE_TOKEN_SECRET
        generateValue: true
      - key: SIGN_IN_PREFILLED
        value: true
      - key: STORAGE_TYPE
        value: local
      - key: IS_SIGN_UP_DISABLED
        value: false
      - key: MESSAGE_QUEUE_TYPE
        value: bull-mq
      - key: CACHE_STORAGE_TYPE
        value: redis
      - key: DEFAULT_SUBDOMAIN
        value: calllive-ai

  # ─────────────────────────────────────────────────────────────────────────────
  # Worker — Background Queue Processor
  # ─────────────────────────────────────────────────────────────────────────────
  - type: worker
    name: calllive-worker
    runtime: node
    region: singapore
    plan: starter
    buildCommand: >
      npm install -g yarn &&
      yarn install --frozen-lockfile &&
      yarn nx build twenty-server
    startCommand: node packages/twenty-server/dist/src/queue-worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: calllive-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: calllive-redis
          type: redis
          property: connectionString
      - key: APP_SECRET
        fromService:
          name: calllive-backend
          type: web
          envVarKey: APP_SECRET
      - key: SERVER_URL
        fromService:
          name: calllive-backend
          type: web
          property: host
      - key: MESSAGE_QUEUE_TYPE
        value: bull-mq
      - key: CACHE_STORAGE_TYPE
        value: redis

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — React/Vite Static Site
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: calllive-frontend
    runtime: static
    region: singapore
    buildCommand: >
      npm install -g yarn &&
      yarn install --frozen-lockfile &&
      yarn nx build twenty-front
    staticPublishPath: packages/twenty-front/build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_BASE_URL
        fromService:
          name: calllive-backend
          type: web
          property: host

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────────────────────────────
  - type: redis
    name: calllive-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────────────────
  - name: calllive-postgres
    region: singapore
    plan: starter
    databaseName: calllive_crm
    user: calllive
